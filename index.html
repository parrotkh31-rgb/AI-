
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoxjaxon AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface-2: #1a1a26;
            --surface-3: #222235;
            --border: rgba(255,255,255,0.07);
            --border-bright: rgba(255,255,255,0.14);
            --accent: #7c6ef7;
            --accent-2: #a78bfa;
            --accent-glow: rgba(124,110,247,0.35);
            --accent-glow-soft: rgba(124,110,247,0.12);
            --text-primary: #f0f0ff;
            --text-secondary: #8888aa;
            --text-muted: #55556a;
            --user-bubble: linear-gradient(135deg, #7c6ef7 0%, #a78bfa 100%);
            --ai-bubble: #1a1a26;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Ambient background glows */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(124,110,247,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(ellipse, rgba(167,139,250,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .chat-wrapper {
            position: relative;
            z-index: 1;
            width: min(680px, 100%);
            display: flex;
            flex-direction: column;
            height: min(820px, calc(100vh - 48px));
        }

        /* Header */
        .chat-header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 24px 24px 0 0;
            padding: 24px 28px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            overflow: hidden;
        }
        .chat-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .ai-avatar {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: linear-gradient(135deg, #7c6ef7, #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .header-text h1 {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }
        .header-text p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 8px rgba(74,222,128,0.6);
            margin-left: auto;
            flex-shrink: 0;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(74,222,128,0.6); }
            50% { opacity: 0.6; box-shadow: 0 0 4px rgba(74,222,128,0.3); }
        }

        /* Messages area */
        .messages-area {
            flex: 1;
            background: var(--surface);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
            scrollbar-color: var(--surface-3) transparent;
        }
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: var(--surface-3);
            border-radius: 4px;
        }

        /* Quick actions */
        .quick-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }
        .quick-btn {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 12px;
            font-family: var(--font-body);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            border-color: var(--accent);
            color: var(--accent-2);
            background: var(--accent-glow-soft);
        }

        /* Message bubbles */
        .message-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            animation: msg-in 0.3s ease-out both;
        }
        @keyframes msg-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-row.user {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }
        .msg-avatar.ai-av {
            background: linear-gradient(135deg, #7c6ef7, #a78bfa);
            box-shadow: 0 0 12px var(--accent-glow);
        }
        .msg-avatar.user-av {
            background: var(--surface-3);
            border: 1px solid var(--border-bright);
        }

        .bubble {
            max-width: 72%;
            padding: 12px 16px;
            font-size: 15px;
            line-height: 1.6;
            word-break: break-word;
        }
        .bubble.ai {
            background: var(--ai-bubble);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 18px 18px 18px 4px;
        }
        .bubble.user {
            background: var(--user-bubble);
            color: #fff;
            border-radius: 18px 18px 4px 18px;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .bubble a {
            color: var(--accent-2);
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .typing-bubble {
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-radius: 18px 18px 18px 4px;
            padding: 14px 18px;
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typing 1.4s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); background: var(--text-muted); }
            30% { transform: translateY(-5px); background: var(--accent-2); }
        }

        /* Divider */
        .time-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 4px 0;
        }
        .time-divider span {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }
        .time-divider::before, .time-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Input area */
        .input-area {
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: 1px solid var(--border-bright);
            border-radius: 0 0 24px 24px;
            padding: 16px 20px 20px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--surface-2);
            border: 1px solid var(--border-bright);
            border-radius: 16px;
            padding: 6px 6px 6px 18px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-row:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow-soft);
        }

        .input-row input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: var(--font-body);
            font-size: 15px;
            color: var(--text-primary);
            padding: 8px 0;
        }
        .input-row input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, #7c6ef7, #a78bfa);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px var(--accent-glow);
        }
        .send-btn:active {
            transform: scale(0.96);
        }
        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }

        .hint-text {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 12px;
        }
        .hint-text code {
            background: var(--surface-3);
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--accent-2);
        }

        .avatar-select-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 15, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 24px;
        }
        .avatar-select-card {
            background: rgba(17, 17, 24, 0.98);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 28px;
            padding: 28px;
            width: min(420px, 100%);
            text-align: center;
            box-shadow: 0 24px 80px rgba(0,0,0,0.35);
        }
        .avatar-select-card h2 {
            margin-bottom: 16px;
            color: var(--text-primary);
            font-family: var(--font-display);
            font-size: 22px;
        }
        .avatar-select-card p {
            margin-bottom: 24px;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .avatar-options {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .avatar-option {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px 22px;
            width: 160px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, background 0.2s;
            color: var(--text-primary);
        }
        .avatar-option:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            background: rgba(124,110,247,0.08);
        }
        .avatar-option .icon {
            font-size: 42px;
            margin-bottom: 10px;
        }
        .avatar-option strong {
            display: block;
            font-size: 15px;
        }

        @media (max-width: 480px) {
            body { padding: 0; }
            .chat-wrapper { height: 100vh; border-radius: 0; }
            .chat-header { border-radius: 0; }
            .input-area { border-radius: 0; }
        }
    </style>
</head>
<body>
<div class="chat-wrapper">
    <div class="chat-header">
        <div class="ai-avatar">🤖</div>
        <div class="header-text">
            <h1> AI Создатель Шохжахон</h1>
            <p>Персональный локальный ассистент</p>
        </div>
        <div class="status-dot"></div>
    </div>

    <div class="messages-area" id="messages">
        <div class="quick-actions">
            <button class="quick-btn" onclick="sendQuick('Привет!')">👋 Привет</button>
            <button class="quick-btn" onclick="sendQuick('Что ты умеешь?')">⚡ Возможности</button>
            <button class="quick-btn" onclick="sendQuick('Конвертируй 50 долларов')">💵 Конвертер</button>
            <button class="quick-btn" onclick="sendQuick('Кто тебя создал')">👤 Автор</button>
        </div>
    </div>

    <div class="input-area">
        <div class="input-row">
            <input id="userInput" type="text" placeholder="Выберите аватарку, чтобы начать..." autocomplete="off" disabled />
            <button class="send-btn" id="sendButton" title="Отправить" disabled>
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
        <p class="hint-text">Скажи <code>запомни вопрос: … ответ: …</code> чтобы меня обучить</p>
    </div>
</div>

<div class="avatar-select-overlay" id="avatarSelectOverlay">
    <div class="avatar-select-card">
        <h2>Вы кто?</h2>
        <p>Выберите образ, который будет использоваться как ваша аватарка в чате.</p>
        <div class="avatar-options">
            <button class="avatar-option" type="button" onclick="chooseAvatar('male')">
                <div class="icon">🙍‍♂️</div>
                <strong>Мужчина</strong>
            </button>
            <button class="avatar-option" type="button" onclick="chooseAvatar('female')">
                <div class="icon">👩‍💼</div>
                <strong>Женщина</strong>
            </button>
        </div>
    </div>
</div>

<script>
    const usdCurr = 28;
    const discount = 0.9;

    const knowledgeBase = [
        {
            triggers: ['привет', 'здравствуй', 'hello', 'hi', 'хай'],
            replies: [
                'Привет! Я AI-ассистент Шохжахона. Чем могу помочь?',
                'Здравствуйте! Рад вас видеть. Спрашивайте что угодно.'
            ]
        },
        {
            triggers: ['что ты умеешь', 'помощь', 'help', 'возможности'],
            replies: [
                'Я умею:\n• Конвертировать валюту: "конвертируй 100 долларов"\n• Считать скидки: "скидка 200"\n• Рассказать о себе: "кто тебя создал"\n• Запоминать новые ответы: "запомни вопрос: … ответ: …"'
            ]
        },
        {
            triggers: ['кто ты', 'что ты'],
            replies: ['Я локальный AI-ассистент, созданный Шохжахоном.']
        }
    ];

    const customQA = [
        { question: 'какой курс доллара', answer: `Текущий курс USD: ${usdCurr} грн.` },
        { question: 'кто тебя создал', answer: 'Меня создал Шохжахон! Напиши "подробнее", чтобы узнать о нём больше.' },
        { question: 'подробнее', answer: 'Шохжахону 14 лет, он живёт в Узбекистане и увлекается программированием. Мечтает стать разработчиком и создал меня, чтобы помогать людям и показать, как работают AI-проекты на HTML/CSS/JS. Хочешь узнать его контакты? Напиши "номер".' },
        { question: 'номер', answer: 'Номер телефона: +998 (93)-253-43-46\nЕсть ещё: Telegram и Instagram — напиши "тг" или "инста".' },
        { question: 'тг', answer: 'Telegram: https://t.me/Shoxjaxon_7777' },
        { question: 'спасибо', answer: 'Пожалуйста! Рад был помочь.👍' },
        { question: 'спасиба', answer: 'Пожалуйста! Рад был помочь.👍' },
        { question: 'тебя когда создали', answer: 'Меня создали в 2026 году. Я локальный AI-ассистент, созданный Шохжахоном.' },
        { question: 'когда тебя создали', answer: 'Меня создали в 2026 году. Я локальный AI-ассистент, созданный Шохжахоном.' }


    ];

    function addCustomQuestion(q, a) {
        customQA.push({ question: q.toLowerCase().trim(), answer: a.trim() });
    }

    function normalizeText(s) {
        try {
            return s.toLowerCase().replace(/[^\p{L}\p{N}\s]/gu, ' ').replace(/\s+/g, ' ').trim();
        } catch {
            return s.toLowerCase().replace(/[^a-z0-9\s]/gi, ' ').replace(/\s+/g, ' ').trim();
        }
    }

    function findCustomAnswer(text) {
        const normalized = normalizeText(text);
        for (const item of customQA) {
            const itemNorm = normalizeText(item.question);
            if (normalized === itemNorm || normalized.includes(itemNorm) || itemNorm.includes(normalized)) {
                return item.answer;
            }
            try {
                const re = new RegExp('\\b' + itemNorm.replace(/\s+/g, '\\s+') + '\\b', 'i');
                if (re.test(text)) return item.answer;
            } catch {}
        }
        return null;
    }

    function convert(amount, curr) {
        return `${amount} USD = ${(curr * amount).toFixed(2)} UAH (курс: ${curr})`;
    }

    function applyDiscount(amount) {
        return `Сумма после скидки ${Math.round((1 - discount) * 100)}%: ${(amount * discount).toFixed(2)}`;
    }

    function parseTeachCommand(message) {
        const m = message.match(/запомни\s+вопрос[:\-]?\s*(.*?)\s+ответ[:\-]?\s*(.+)$/i);
        if (m && m[1] && m[2]) {
            addCustomQuestion(m[1], m[2]);
            return `Запомнил! На вопрос «${m[1].trim()}» отвечу: «${m[2].trim()}».`;
        }
        return null;
    }

    function getAIReply(message) {
        const text = message.toLowerCase();
        const teachReply = parseTeachCommand(message);
        if (teachReply) return teachReply;
        const customReply = findCustomAnswer(message);
        if (customReply) return customReply;
        const convertMatch = message.match(/(конверт|курс|доллар)\s*(\d+(?:[.,]\d+)?)/i);
        if (convertMatch) return convert(parseFloat(convertMatch[2].replace(',', '.')), usdCurr);
        const discountMatch = message.match(/(скидк|сумма)\s*(\d+(?:[.,]\d+)?)/i);
        if (discountMatch) return applyDiscount(parseFloat(discountMatch[2].replace(',', '.')));
        if (text.includes('курс')) return `Текущий курс USD/UAH: ${usdCurr}.`;
        for (const entry of knowledgeBase) {
            if (entry.triggers.some(t => text.includes(t))) {
                return entry.replies[Math.floor(Math.random() * entry.replies.length)];
            }
        }
        return 'Пока не знаю, как ответить на это 🤔\nПопробуй спросить о валюте, скидке, или обучи меня: "Запомни вопрос: … ответ: …"';
    }

    function escapeHtml(str) {
        return str
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function linkify(str) {
        if (!str) return '';
        let out = escapeHtml(str);
        out = out.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/gi, (_, t, u) =>
            `<a href="${u}" target="_blank" rel="noopener noreferrer">${t}</a>`);
        out = out.replace(/\bhttps?:\/\/[\w\-._~:\/?#\[\]@!$&'()*+,;=%]+/gi, url =>
            `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`);
        out = out.replace(/\n/g, '<br>');
        return out;
    }

    let userAvatar = '🙍‍♂️';
    let userGender = null;

    function addMessage(text, sender) {
        const container = document.getElementById('messages');

        const row = document.createElement('div');
        row.className = `message-row ${sender}`;

        const avatar = document.createElement('div');
        avatar.className = `msg-avatar ${sender === 'ai' ? 'ai-av' : 'user-av'}`;
        avatar.textContent = sender === 'ai' ? '🤖' : userAvatar;

        const bubble = document.createElement('div');
        bubble.className = `bubble ${sender}`;
        if (sender === 'user') {
            bubble.textContent = text;
        } else {
            bubble.innerHTML = linkify(text);
        }

        row.appendChild(avatar);
        row.appendChild(bubble);
        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
        const container = document.getElementById('messages');
        const typingRow = document.createElement('div');
        typingRow.className = 'typing-indicator';
        typingRow.id = 'typing';
        typingRow.innerHTML = `
            <div class="msg-avatar ai-av">🤖</div>
            <div class="typing-bubble">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>`;
        container.appendChild(typingRow);
        container.scrollTop = container.scrollHeight;
    }

    function hideTyping() {
        const t = document.getElementById('typing');
        if (t) t.remove();
    }

    function handleSend() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;
        addMessage(text, 'user');
        input.value = '';
        showTyping();
        setTimeout(() => {
            hideTyping();
            addMessage(getAIReply(text), 'ai');
        }, 600 + Math.random() * 400);
    }

    function chooseAvatar(type) {
        userGender = type;
        userAvatar = type === 'female' ? '👩‍💼' : '🙍‍♂️';
        const overlay = document.getElementById('avatarSelectOverlay');
        const input = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');

        overlay.style.display = 'none';
        input.disabled = false;
        input.placeholder = 'Напишите сообщение...';
        sendButton.disabled = false;
        input.focus();

        addMessage('Отлично! Теперь ваш аватарка: ' + userAvatar + '. Напишите сообщение или выберите одну из быстрых кнопок.', 'ai');
    }

    function sendQuick(text) {
        addMessage(text, 'user');
        showTyping();
        setTimeout(() => {
            hideTyping();
            addMessage(getAIReply(text), 'ai');
        }, 600 + Math.random() * 400);
    }

    window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('sendButton').addEventListener('click', handleSend);
        document.getElementById('userInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleSend();
        });
        document.getElementById('avatarSelectOverlay').style.display = 'flex';
        setTimeout(() => {
            addMessage('Привет! Я Shoxjaxon AI 👋\nВыберите, кем вы хотите быть: мужчина или женщина.', 'ai');
        }, 300);
    });
</script>
